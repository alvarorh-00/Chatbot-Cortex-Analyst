version: '3.8'

services:
  chatbot:
    build: .
    container_name: chatbot-incidencias
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - .:/app
    restart: unless-stopped
    # Para variables de entorno de Snowflake, descomenta y configura:
    # env_file:
    #   - .env
